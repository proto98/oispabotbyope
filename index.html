<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2048 Game</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #faf8ef;
}

#score {
  font-size: 20px;
  margin: 10px;
}

#rebirthBtn {
  margin: 10px;
  padding: 10px 15px;
  font-size: 16px;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 8px;
  opacity: 0.6;
  cursor: not-allowed;
}

#rebirthBtn.enabled {
  opacity: 1;
  cursor: pointer;
}

/* BOARD */
#game {
  width: min(90vw, 320px);
  aspect-ratio: 1 / 1;
  margin: auto;

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;

  background: #bbada0;
  padding: 10px;
  border-radius: 10px;
  box-sizing: border-box;
}

/* TILE */
.tile {
  width: 100%;
  aspect-ratio: 1 / 1;

  border-radius: 8px;

  background-color: #cdc1b4;
  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* animations */
.spawn { animation: pop 0.15s ease; }

@keyframes pop {
  0% { transform: scale(0.2); }
  100% { transform: scale(1); }
}

.merge { animation: wobble 0.2s ease; }

@keyframes wobble {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* overlay */
#overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;

  background: rgba(150,0,0,0.9);
  color: white;

  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.message {
  font-size: 60px;
  font-weight: bold;
}

button {
  padding: 10px;
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>oispa botby lärare</h1>

<div id="score">gul wilma: 0<br>High Score: 0</div>

<button id="rebirthBtn" onclick="rebirth()" disabled>
  GÅ TILL PRISMA
</button>

<div id="game"></div>

<div id="overlay">
  <div class="message">kvarsittning</div>
  <div id="finalScore"></div>
  <button onclick="restart()">Restart</button>
</div>

<script>
const size = 4;

let board = [];
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

let spawn = null;
let merges = [];

function init() {
  board = Array(size).fill().map(() => Array(size).fill(0));
  score = 0;

  document.getElementById("overlay").style.display = "none";

  addTile();
  addTile();
  draw();
}

function addTile() {
  let empty = [];

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] === 0) empty.push({r, c});
    }
  }

  if (!empty.length) return;

  let {r, c} = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;

  spawn = {r, c};
}

function updateRebirthButton() {
  const btn = document.getElementById("rebirthBtn");

  if (score >= 1000) {
    btn.disabled = false;
    btn.classList.add("enabled");
  } else {
    btn.disabled = true;
    btn.classList.remove("enabled");
  }
}

function draw() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  document.getElementById("score").innerHTML =
    "gul wilma: " + score + "<br>High Score: " + highScore;

  updateRebirthButton();

  board.forEach((row, r) => {
    row.forEach((value, c) => {

      const tile = document.createElement("div");
      tile.className = "tile";

      // ✅ ONLY FIXED LINE (NO images/ folder)
      if (value !== 0) {
        tile.style.backgroundImage = `url(${value}.jpg)`;
      } else {
        tile.style.backgroundImage = "";
      }

      if (spawn && spawn.r === r && spawn.c === c) {
        tile.classList.add("spawn");
      }

      if (merges.includes(value)) {
        tile.classList.add("merge");
      }

      game.appendChild(tile);
    });
  });

  spawn = null;
  merges = [];
}

function rebirth() {
  if (score < 1000) return;

  score -= 1000;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] < 32) board[r][c] = 0;
    }
  }

  draw();
}

function slide(row) {
  let arr = row.filter(v => v);

  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      merges.push(arr[i]);
      arr[i + 1] = 0;
    }
  }

  arr = arr.filter(v => v);
  while (arr.length < size) arr.push(0);
  return arr;
}

function moveLeft() {
  board = board.map(r => slide(r));
  return true;
}

function moveRight() {
  board = board.map(r => slide([...r].reverse()).reverse());
  return true;
}

function moveUp() {
  for (let c = 0; c < size; c++) {
    let col = board.map(r => r[c]);
    let after = slide(col);
    for (let r = 0; r < size; r++) board[r][c] = after[r];
  }
  return true;
}

function moveDown() {
  for (let c = 0; c < size; c++) {
    let col = board.map(r => r[c]).reverse();
    let after = slide(col).reverse();
    for (let r = 0; r < size; r++) board[r][c] = after[r];
  }
  return true;
}

function canMove() {
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (board[r][c] === 0) return true;

      let v = board[r][c];
      if (r < size - 1 && board[r+1][c] === v) return true;
      if (c < size - 1 && board[r][c+1] === v) return true;
    }
  }
  return false;
}

function gameOver() {
  document.getElementById("overlay").style.display = "flex";
  document.getElementById("finalScore").textContent = "Score: " + score;
}

const keyMap = {
  ArrowLeft: moveLeft, a: moveLeft,
  ArrowRight: moveRight, d: moveRight,
  ArrowUp: moveUp, w: moveUp,
  ArrowDown: moveDown, s: moveDown,
};

document.addEventListener("keydown", e => {
  const move = keyMap[e.key];
  if (!move) return;

  const moved = move();

  if (moved) {
    addTile();
    draw();
    if (!canMove()) gameOver();
  }
});

function restart() {
  init();
}

init();
</script>

</body>
</html>
